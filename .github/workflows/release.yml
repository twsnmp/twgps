name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows/amd64
            os: windows-latest
            artifact_name: twgps-windows-amd64.zip
          - platform: linux/amd64
            os: ubuntu-latest
            artifact_name: twgps-linux-amd64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' # Aligns with mise.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Aligns with mise.toml

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev build-essential pkg-config
          sudo apt-get install -y libwebkit2gtk-4.0-dev || sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails App
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Package Release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Compress the compiled executable from build/bin into a zip
          Compress-Archive -Path build/bin/twgps.exe -DestinationPath ${{ matrix.artifact_name }}

      - name: Package Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Compress the compiled binary from build/bin into a tar.gz
          tar -czvf ${{ matrix.artifact_name }} -C build/bin twgps

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
